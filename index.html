<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BenHjila - Gestion Stock</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Arial;background:#e8f0fe}
.header{background:#2c3e50;color:white;padding:20px;text-align:center}
.nav{display:flex;background:#34495e}
.nav button{flex:1;padding:15px;background:transparent;border:none;color:white;cursor:pointer;font-size:16px}
.nav button.active{background:#27ae60}
.container{max-width:700px;margin:20px auto;padding:0 15px}
.card{background:white;padding:25px;border-radius:10px;box-shadow:0 3px 10px rgba(0,0,0,0.1);margin-bottom:15px;display:none}
.card.active{display:block}
input,select{width:100%;padding:12px;margin:8px 0;border:2px solid #ddd;border-radius:6px;font-size:15px}
.btn{background:#27ae60;color:white;border:none;padding:14px;border-radius:6px;cursor:pointer;font-size:16px;width:100%;margin-top:10px;font-weight:bold}
.btn:hover{background:#219a52}
.btn-danger{background:#e74c3c}
.produit{display:flex;justify-content:space-between;align-items:center;background:#f8f9fa;padding:15px;margin:8px 0;border-radius:8px;border-left:4px solid #27ae60}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:15px 0}
.stat{background:#3498db;color:white;padding:20px;border-radius:8px;text-align:center}
.stat h3{font-size:28px;margin-bottom:5px}
</style>
</head>
<body>

<div class="header">
<h1>BenHjila - Gestion de Stock</h1>
<p>برنامج إدارة قطع الغيار</p>
</div>

<div class="nav">
<button class="active" onclick="showTab('dash')">Tableau de bord</button>
<button onclick="showTab('ajout')">Ajouter</button>
<button onclick="showTab('liste')">Produits</button>
</div>

<div class="container">

<div id="dash" class="card active">
<h2>Tableau de bord</h2>
<p>Bienvenue dans votre application</p>
<div class="stats">
<div class="stat"><h3 id="totalProd">0</h3><div>Total Produits</div></div>
<div class="stat"><h3 id="totalQte">0</h3><div>Total Quantité</div></div>
</div>
</div>

<div id="ajout" class="card">
<h2>Ajouter produit</h2>
<input type="text" id="nom" placeholder="Nom de la pièce">
<input type="number" id="qte" placeholder="Quantité">
<input type="number" id="prix" placeholder="Prix unitaire MAD">
<button class="btn" onclick="ajouter()">Ajouter au stock</button>
</div>

<div id="liste" class="card">
<h2>Liste des produits</h2>
<div id="listeProduits"></div>
<button class="btn btn-danger" onclick="viderStock()">Vider tout le stock</button>
</div>

</div>

<script>
let produits = JSON.parse(localStorage.getItem('benhjilaStock')) || [];

function showTab(tab){
  document.querySelectorAll('.card').forEach(c=>c.classList.remove('active'));
  document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById(tab).classList.add('active');
  event.target.classList.add('active');
  afficher();
}

function afficher(){
  let div = document.getElementById('listeProduits');
  let totalProd = produits.length;
  let totalQte = produits.reduce((s,p)=>s+parseInt(p.qte||0),0);
  
  document.getElementById('totalProd').textContent = totalProd;
  document.getElementById('totalQte').textContent = totalQte;
  
  if(produits.length==0){
    div.innerHTML='<p style="text-align:center;color:#999">Aucun produit dans le stock</p>';
    return;
  }
  
  div.innerHTML = produits.map((p,i)=>`
    <div class="produit">
      <div><b>${p.nom}</b><br><small>Qté: ${p.qte} | Prix: ${p.prix} MAD</small></div>
      <button onclick="supprimer(${i})" style="background:#e74c3c;color:white;border:none;padding:8px 12px;border-radius:5px;cursor:pointer">Supprimer</button>
    </div>
  `).join('');
}

function ajouter(){
  let nom = document.getElementById('nom').value.trim();
  let qte = document.getElementById('qte').value;
  let prix = document.getElementById('prix').value;
  if(!nom || !qte){alert('Remplir nom et quantité');return}
  produits.push({nom,qte,prix:prix||0});
  localStorage.setItem('benhjilaStock',JSON.stringify(produits));
  document.getElementById('nom').value='';
  document.getElementById('qte').value='';
  document.getElementById('prix').value='';
  showTab('liste');
}

function supprimer(i){
  if(confirm('Supprimer ce produit?')){
    produits.splice(i,1);
    localStorage.setItem('benhjilaStock',JSON.stringify(produits));
    afficher();
  }
}

function viderStock(){
  if(confirm('Vider tout le stock?')){
    produits=[];
    localStorage.setItem('benhjilaStock',JSON.stringify(produits));
    afficher();
  }
}
afficher();
</script>
</body>
  </html>
