<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BenHjila - Gestion de Stock</title>
<style>
body{font-family:Arial;max-width:600px;margin:40px auto;padding:20px;background:#f5f5f5}
h1{color:#2c3e50;text-align:center}
.card{background:white;padding:20px;border-radius:10px;box-shadow:0 2px 5px rgba(0,0,0,0.1)}
button{background:#27ae60;color:white;border:none;padding:12px 20px;border-radius:5px;cursor:pointer;font-size:16px;width:100%;margin-top:10px}
button:hover{background:#219a52}
input{width:100%;padding:10px;margin:8px 0;border:1px solid #ddd;border-radius:5px;box-sizing:border-box}
#liste{margin-top:20px}
.produit{background:#ecf0f1;padding:10px;margin:5px 0;border-radius:5px}
</style>
</head>
<body>
<h1>BenHjila - Gestion de Stock</h1>
<div class="card">
<h2>Tableau de bord</h2>
<p>Bienvenue dans votre application</p>

<h3>Ajouter produit</h3>
<input type="text" id="nom" placeholder="Nom du produit">
<input type="number" id="qte" placeholder="Quantité">
<button onclick="ajouter()">Ajouter produit</button>

<div id="liste"></div>
</div>

<script>
let produits = JSON.parse(localStorage.getItem('stock')) || [];

function afficher() {
  let div = document.getElementById('liste');
  if(produits.length==0){div.innerHTML='<p>Aucun produit</p>';return}
  div.innerHTML = produits.map((p,i)=>`<div class="produit">${p.nom} - Qté: ${p.qte}</div>`).join('');
}

function ajouter() {
  let nom = document.getElementById('nom').value;
  let qte = document.getElementById('qte').value;
  if(nom && qte){
    produits.push({nom,qte});
    localStorage.setItem('stock',JSON.stringify(produits));
    document.getElementById('nom').value='';
    document.getElementById('qte').value='';
    afficher();
  }
}
afficher();
</script>
</body>
</html>
