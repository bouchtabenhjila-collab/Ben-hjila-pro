<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BenHjila - Gestion Stock</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Arial;background:#f0f4f8}
.header{background:#2c3e50;color:white;padding:20px;text-align:center}
.nav{display:flex;background:#34495e;flex-wrap:wrap}
.nav button{flex:1;min-width:100px;padding:14px;background:transparent;border:none;color:white;cursor:pointer;font-size:13px}
.nav button.active{background:#27ae60}
.container{max-width:1100px;margin:20px auto;padding:0 15px}
.card{background:white;padding:25px;border-radius:12px;box-shadow:0 3px 10px rgba(0,0,0,0.1);margin-bottom:20px;display:none}
.card.show{display:block}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:15px}
input,select{width:100%;padding:12px;margin:8px 0;border:2px solid #ddd;border-radius:8px;font-size:15px}
.btn{background:#27ae60;color:white;border:none;padding:14px 18px;border-radius:8px;cursor:pointer;font-size:15px;font-weight:bold;margin:5px}
.btn-blue{background:#3498db}.btn-red{background:#e74c3c}.btn-orange{background:#f39c12}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin:20px 0}
.stat{background:#3498db;color:white;padding:20px;border-radius:10px;text-align:center}
.stat h3{font-size:30px}
.table{width:100%;border-collapse:collapse;margin-top:15px}
.table th{background:#34495e;color:white;padding:12px;text-align:left}
.table td{padding:10px;border-bottom:1px solid #eee}
@media(max-width:768px){.grid-2{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="header">
<h1>BenHjila - Gestion Stock PRO</h1>
<p>Stocks | Pointage | Gasoil | Entrée/Sortie | Code Barre</p>
</div>

<div class="nav">
<button onclick="showTab('dash')">Dashboard</button>
<button onclick="showTab('produits')">Produits</button>
<button onclick="showTab('entree')">Entrée</button>
<button onclick="showTab('sortie')">Sortie</button>
<button onclick="showTab('pointage')">Pointage</button>
<button onclick="showTab('gasoil')">Gasoil</button>
<button onclick="showTab('codebarre')">Code Barre</button>
</div>

<div class="container">

<div id="dash" class="card show">
<h2>Dashboard</h2>
<div class="stats">
<div class="stat"><h3 id="sProduits">0</h3><div>Produits</div></div>
<div class="stat"><h3 id="sEntree">0</h3><div>Entrées</div></div>
<div class="stat"><h3 id="sSortie">0</h3><div>Sorties</div></div>
<div class="stat"><h3 id="sGasoil">0 L</h3><div>Gasoil</div></div>
</div>
<button class="btn btn-blue" onclick="exportExcel()">📊 Export Excel</button>
<button class="btn btn-red" onclick="exportPDF()">📄 Export PDF</button>
</div>

<div id="produits" class="card">
<h2>Gestion Produits</h2>
<div class="grid-2">
<div>
<input type="hidden" id="editIdx">
<input type="text" id="nom" placeholder="Nom produit">
<input type="text" id="ref" placeholder="Référence/Code barre">
<select id="cat"><option>Catégorie</option><option>Pièces</option><option>Gasoil</option><option>Huile</option></select>
<input type="number" id="qte" placeholder="Quantité">
<input type="number" id="prix" placeholder="Prix MAD">
<input type="number" id="seuil" placeholder="Seuil alerte">
<button class="btn" onclick="saveProd()">💾 Enregistrer</button>
</div>
<div>
<input type="text" id="search" placeholder="🔍 Chercher..." onkeyup="afficherProduits()">
<table class="table"><thead><tr><th>Nom</th><th>Qté</th><th>Action</th></tr></thead>
<tbody id="listeProd"></tbody></table>
</div>
</div>
</div>

<div id="entree" class="card">
<h2>Entrée Stock</h2>
<select id="entreeProd"></select>
<input type="number" id="entreeQte" placeholder="Quantité entrée">
<input type="text" id="entreeFour" placeholder="Fournisseur">
<button class="btn btn-blue" onclick="addEntree()">➕ Valider Entrée</button>
<table class="table"><thead><tr><th>Produit</th><th>Qté</th><th>Fournisseur</th></tr></thead>
<tbody id="histEntree"></tbody></table>
</div>

<div id="sortie" class="card">
<h2>Sortie Stock</h2>
<select id="sortieProd"></select>
<input type="number" id="sortieQte" placeholder
